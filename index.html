<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>北航大师台球积分赛</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --primary: #2c3e50; --accent: #3498db; --bg: #f0f2f5; --card: #ffffff; --danger: #e74c3c; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); color: #333; padding: 15px; margin: 0; line-height: 1.5; }
        h1 { text-align: center; font-size: 1.4rem; color: var(--primary); margin: 10px 0; }
        .box { background: var(--card); padding: 18px; border-radius: 12px; margin-bottom: 15px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
        h2 { font-size: 1.1rem; margin-bottom: 12px; border-left: 4px solid var(--accent); padding-left: 10px; display: flex; justify-content: space-between; align-items: center; }
        label { display: block; margin-top: 12px; font-weight: bold; font-size: 0.85rem; color: #666; }
        input, select { box-sizing: border-box; padding: 12px; margin-top: 5px; width: 100%; border: 1px solid #ddd; border-radius: 8px; font-size: 16px; background: #fafafa; }
        .player { background: #fdfdfd; border: 1px solid #eee; padding: 12px; margin-top: 12px; border-radius: 10px; position: relative; }
        .remove-btn { position: absolute; right: 5px; top: 5px; color: var(--danger); background: none; border: none; font-size: 18px; }
        button { display: block; width: 100%; padding: 12px; border: none; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; }
        .btn-add { background: #ecf0f1; color: var(--primary); border: 1px dashed #bdc3c7; margin-top: 10px; }
        .btn-save { background: var(--accent); color: white; margin-top: 20px; }
        .status { text-align: center; font-size: 11px; color: #999; margin-bottom: 8px; }
        .table-container { width: 100%; overflow-x: auto; -webkit-overflow-scrolling: touch; }
        table { width: 100%; min-width: 350px; border-collapse: collapse; font-size: 13px; }
        th, td { border-bottom: 1px solid #eee; padding: 10px 5px; text-align: left; }
        .del-text { color: var(--danger); font-size: 12px; text-decoration: underline; cursor: pointer; }
        .pos { color: #e67e22; font-weight: bold; }
        .neg { color: #27ae60; font-weight: bold; }
        /* 追分模式下的布局辅助 */
        .flex-row { display: flex; gap: 10px; align-items: center; }
        .flex-row > div { flex: 1; }
    </style>
</head>
<body>

<h1>🎱 北航大师赛 (云端同步)</h1>
<div id="status" class="status">同步中...</div>

<div class="box">
    <h2>🏆 总积分榜</h2>

    <div style="
        background:#f8f9fb;
        border:1px dashed #d0d7de;
        padding:10px;
        border-radius:8px;
        margin-bottom:10px;
        font-size:13px;
        line-height:1.6;
    ">
        🎯 赛制说明：<br>
        赛季末取 <b>前四名</b> 抽签进行单挑赛（中八），决出前三名。<br>
        🥇 冠军奖品：Taom V10巧克<br>
        🥈 亚军奖品：握迈手套<br>
        🥉 季军奖品：TP巧克
    </div>

    <div id="ranking">加载中...</div>
</div>

<div class="box">
    <h2>📝 新增对局</h2>
    <label>玩法</label>
    <select id="mode" onchange="updateMode()">
        <option value="中八">中八</option>
        <option value="追分">追分</option>
    </select>

    <label>门/比分</label>
    <input id="handicap" placeholder="门: 如 A让B后2">
    
    <div id="scoreSection">
        <input id="score" placeholder="比分: 如 11:7" style="margin-top:10px">
    </div>

    <div id="multiplierSection" style="display:none">
        <label>倍率 (×几)</label>
        <input id="multiplier" type="number" value="1" placeholder="每分多少积分" oninput="calculateAllMoney()">
    </div>
    
    <h3>玩家信息</h3>
    <div id="playersArea"></div>
    <button class="btn-add" onclick="addPlayerRow()">➕ 添加玩家</button>
    <button id="saveBtn" class="btn-save" onclick="saveGame()">💾 同步到云端</button>
</div>

<div class="box">
    <h2>🕒 最近记录</h2>
    <div class="table-container">
        <table id="recentTable">
            <thead>
                <tr>
                    <th>时间/玩法</th>
                    <th>结果</th>
                    <th>详情(积分)</th>
                    <th>操作</th>
                </tr>
            </thead>
            <tbody id="recentBody"></tbody>
        </table>
    </div>
</div>

<script>
const SUPABASE_URL = 'https://ajfyuffofmxaucturukn.supabase.co';
const SUPABASE_KEY = 'sb_publishable_y9VSWzjzA73CqeQTqoQcKg_YhtL01uJ';

const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
let globalPlayerList = [];

async function init() {
    await fetchPlayerList();
    await loadRecords();
}

async function fetchPlayerList() {
    const { data } = await _supabase.from('players').select('name').order('name');
    if (data) globalPlayerList = data.map(p => p.name);
}

function addPlayerRow() {
    const mode = document.getElementById('mode').value;
    const div = document.createElement('div');
    div.className = 'player';
    let options = globalPlayerList.map(name => `<option value="${name}">${name}</option>`).join('');
    
    // 根据模式决定是否显示“分数”输入框
    const showScoreInput = (mode === '追分') ? 'block' : 'none';

    div.innerHTML = `
        <button class="remove-btn" onclick="this.parentNode.remove()">✕</button>
        <label>姓名</label>
        <select class="name-select" onchange="checkNewPlayer(this)">
            <option value="">-- 请选择 --</option>
            ${options}
            <option value="__NEW__" style="color:blue">+ 新增玩家</option>
        </select>
        <input class="new-name-input" placeholder="输入新姓名" style="display:none; margin-top:10px; border-color:var(--accent)">
        
        <div class="flex-row" style="margin-top:12px">
            <div class="score-input-wrap" style="display:${showScoreInput}">
                <label>分数</label>
                <input class="p-score" type="number" placeholder="分数" oninput="calculateMoney(this.parentNode.parentNode.parentNode)">
            </div>
            <div>
                <label>积分</label>
                <input class="money" type="number" placeholder="赢+ 输-">
            </div>
        </div>
    `;
    document.getElementById('playersArea').appendChild(div);
}

// 计算单个玩家积分
function calculateMoney(playerDiv) {
    if (document.getElementById('mode').value !== '追分') return;
    const mult = Number(document.getElementById('multiplier').value) || 0;
    const score = Number(playerDiv.querySelector('.p-score').value) || 0;
    playerDiv.querySelector('.money').value = mult * score;
}

// 当倍率变化时，重新计算所有人积分
function calculateAllMoney() {
    document.querySelectorAll('.player').forEach(div => calculateMoney(div));
}

function updateMode() {
    const mode = document.getElementById('mode').value;
    const isZhuifen = (mode === '追分');
    
    document.getElementById('scoreSection').style.display = isZhuifen ? 'none' : 'block';
    document.getElementById('multiplierSection').style.display = isZhuifen ? 'block' : 'none';
    
    // 同步更新已有的玩家输入框显示
    document.querySelectorAll('.score-input-wrap').forEach(el => {
        el.style.display = isZhuifen ? 'block' : 'none';
    });
}

function checkNewPlayer(select) {
    const input = select.parentNode.querySelector('.new-name-input');
    input.style.display = (select.value === "__NEW__") ? "block" : "none";
}

async function saveGame() {
    const btn = document.getElementById('saveBtn');
    const rows = document.querySelectorAll('.player');
    const mode = document.getElementById('mode').value;
    let names = [], money = [], newNames = [];

    for (let row of rows) {
        const sel = row.querySelector('.name-select');
        const inp = row.querySelector('.new-name-input');
        const mon = Number(row.querySelector('.money').value);
        let n = (sel.value === "__NEW__") ? inp.value.trim() : sel.value;
        if (!n) return alert("请完整填写");
        names.push(n); money.push(mon);
        if (sel.value === "__NEW__" && !globalPlayerList.includes(n)) newNames.push({name: n});
    }

    if (names.length === 0) return alert("请至少添加一名玩家");

    btn.disabled = true; btn.innerText = "同步中...";
    if (newNames.length > 0) await _supabase.from('players').insert(newNames);

    // 如果是追分模式，结果字段记录倍率信息
    const resultVal = (mode === '追分') 
        ? `倍率: ×${document.getElementById('multiplier').value}` 
        : document.getElementById('score').value;

    const payload = {
        time: new Date().toLocaleString('zh-CN', {month:'short', day:'numeric', hour:'2-digit', minute:'2-digit'}),
        mode: mode,
        handicap: document.getElementById('handicap').value,
        result: resultVal,
        players: names,
        money: money
    };

    const { error } = await _supabase.from('records').insert([{ data: payload }]);
    if (error) { alert(error.message); btn.disabled = false; } else { location.reload(); }
}

async function loadRecords() {
    const { data } = await _supabase.from('records').select('*').order('created_at', { ascending: false }).limit(30);
    const body = document.getElementById('recentBody');
    const ranking = document.getElementById('ranking');
    const status = document.getElementById('status');

    if (!data) { status.innerText = "❌ 连接失败"; return; }
    status.innerText = "✅ 数据已实时同步";

    let rankMap = {};
    body.innerHTML = "";

    data.forEach(item => {
        const r = item.data;
        const tr = document.createElement('tr');
        tr.innerHTML = `
            <td><small>${r.time}</small><br><strong>${r.mode}</strong></td>
            <td><strong>${r.result}</strong><br><small>${r.handicap||'-'}</small></td>
            <td>${r.players.map((p,i)=>`${p}(${r.money[i]})`).join('<br>')}</td>
            <td><span class="del-text" onclick="deleteRecord(${item.id})">删除</span></td>
        `;
        body.appendChild(tr);
        r.players.forEach((p,i) => rankMap[p] = (rankMap[p]||0) + r.money[i]);
    });

    let rankHtml = `<table><thead><tr><th>姓名</th><th>总积分</th></tr></thead><tbody>`;
    Object.entries(rankMap).sort((a,b)=>b[1]-a[1]).forEach(([n, v]) => {
        rankHtml += `<tr><td>${n}</td><td class="${v>=0?'pos':'neg'}">${v>0?'+'+v:v}</td></tr>`;
    });
    ranking.innerHTML = rankHtml + `</tbody></table>`;
}

async function deleteRecord(id) {
    if (!confirm("确定要删除这条记录吗？")) return;
    const { error } = await _supabase.from('records').delete().eq('id', id);
    if (error) alert("删除失败: " + error.message);
    else location.reload();
}

init();
</script>
</body>
</html>
