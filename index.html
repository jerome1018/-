<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>北航大师台球积分赛</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --primary: #2c3e50; --accent: #3498db; --bg: #f0f2f5; --card: #ffffff; --danger: #e74c3c; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); color: #333; padding: 15px; margin: 0; line-height: 1.5; }
        h1 { text-align: center; font-size: 1.5rem; color: var(--primary); margin-bottom: 20px; }
        .box { background: var(--card); padding: 18px; border-radius: 12px; margin-bottom: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
        h2 { font-size: 1.1rem; margin-bottom: 15px; border-left: 4px solid var(--accent); padding-left: 10px; }
        label { display: block; margin-top: 15px; font-weight: bold; font-size: 0.9rem; color: #666; }
        input, select { box-sizing: border-box; padding: 12px; margin-top: 6px; width: 100%; border: 1px solid #ddd; border-radius: 8px; font-size: 16px; background: #fafafa; }
        .player { background: #fdfdfd; border: 1px solid #eee; padding: 15px; margin-top: 15px; border-radius: 10px; position: relative; }
        .remove-btn { position: absolute; right: 5px; top: 5px; color: var(--danger); background: none; border: none; font-size: 20px; cursor: pointer; }
        button { display: block; width: 100%; padding: 12px; margin-top: 15px; border: none; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; }
        .btn-add { background: #ecf0f1; color: var(--primary); border: 1px dashed #bdc3c7; }
        .btn-save { background: var(--accent); color: white; margin-top: 25px; }
        .table-container { width: 100%; overflow-x: auto; }
        table { width: 100%; min-width: 400px; border-collapse: collapse; font-size: 14px; }
        th, td { border-bottom: 1px solid #eee; padding: 12px 8px; text-align: left; }
        .status { text-align: center; font-size: 12px; color: #999; margin-bottom: 10px; }
        .pos { color: #e67e22; font-weight: bold; }
        .neg { color: #27ae60; font-weight: bold; }
    </style>
</head>
<body>

<h1>🎱 北航大师赛 (云端版)</h1>
<div id="status" class="status">同步中...</div>

<div class="box">
    <h2>新增对局</h2>
    <label>玩法</label>
    <select id="mode" onchange="updateMode()">
        <option value="中八">中八</option>
        <option value="追分">追分</option>
    </select>
    <label>盘口</label>
    <input id="handicap" placeholder="例如：A让B 后2" />
    <div id="scoreSection">
        <label>比分（中八）</label>
        <input id="score" placeholder="例如：11:7" />
    </div>
    <h3>玩家信息</h3>
    <div id="players"></div>
    <button class="btn-add" onclick="addPlayer()">➕ 添加玩家</button>
    <button id="saveBtn" class="btn-save" onclick="saveToCloud()">💾 同步到云端</button>
</div>

<div class="box">
    <h2>最近记录</h2>
    <div class="table-container">
        <table>
            <thead><tr><th>玩法/时间</th><th>结果</th><th>详情(金额)</th></tr></thead>
            <tbody id="recent"></tbody>
        </table>
    </div>
</div>

<div class="box">
    <h2>总奖金榜</h2>
    <table id="rankingTable">
        <thead><tr><th>姓名</th><th>总奖金</th></tr></thead>
        <tbody id="ranking"></tbody>
    </table>
</div>

<script>
// --- 配置区 ---
const SUPABASE_URL = 'https://ajfyuffofmxaucturukn.supabase.co'; // 这里填 https:// 开头的那个网址
const SUPABASE_KEY = 'sb_publishable_y9VSWzjzA73CqeQTqoQcKg_YhtL01uJ'; // 这是你刚拿到的Key
// --------------

const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

// 核心功能：保存数据
async function saveToCloud() {
    const btn = document.getElementById('saveBtn');
    const names = [...document.querySelectorAll('.name')].map(i => i.value.trim());
    const money = [...document.querySelectorAll('.money')].map(i => Number(i.value));
    const points = [...document.querySelectorAll('.point')].map(i => Number(i.value || 0));

    if (names.length < 2 || names.some(n => !n)) return alert("请完整填写玩家信息");

    btn.disabled = true;
    btn.innerText = "同步中...";

    const payload = {
        time: new Date().toLocaleString('zh-CN', {month:'short', day:'numeric', hour:'2-digit', minute:'2-digit'}),
        mode: document.getElementById('mode').value,
        handicap: document.getElementById('handicap').value,
        result: document.getElementById('mode').value === '中八' ? document.getElementById('score').value : points.join(','),
        players: names,
        money: money
    };

    const { error } = await _supabase.from('records').insert([{ data: payload }]);

    if (error) {
        alert("错误: " + error.message);
        btn.disabled = false;
        btn.innerText = "💾 重试同步";
    } else {
        location.reload();
    }
}

// 核心功能：加载并渲染数据
async function loadData() {
    const { data, error } = await _supabase.from('records').select('*').order('created_at', { ascending: false }).limit(20);
    const statusEl = document.getElementById('status');
    
    if (error) {
        statusEl.innerText = "❌ 连接失败";
        return;
    }
    statusEl.innerText = "✅ 云端已同步";

    const recent = document.getElementById('recent');
    const rankData = {};
    recent.innerHTML = "";

    data.forEach(item => {
        const r = item.data;
        const tr = document.createElement('tr');
        tr.innerHTML = `
            <td><strong>${r.mode}</strong><br><small>${r.time}</small></td>
            <td><strong>${r.result}</strong><br><small>${r.handicap||'-'}</small></td>
            <td>${r.players.map((p, i) => `${p}(${r.money[i]})`).join('<br>')}</td>
        `;
        recent.appendChild(tr);

        // 统计奖金
        r.players.forEach((name, i) => {
            rankData[name] = (rankData[name] || 0) + r.money[i];
        });
    });

    const ranking = document.getElementById('ranking');
    ranking.innerHTML = "";
    Object.entries(rankData).sort((a,b) => b[1] - a[1]).forEach(([name, total]) => {
        const tr = document.createElement('tr');
        tr.innerHTML = `<td>${name}</td><td class="${total>=0?'pos':'neg'}">${total > 0 ? '+'+total : total}</td>`;
        ranking.appendChild(tr);
    });
}

function addPlayer() {
    const mode = document.getElementById('mode').value;
    const div = document.createElement('div');
    div.className = 'player';
    div.innerHTML = `
        <button class="remove-btn" onclick="this.parentNode.remove()">✕</button>
        <label>姓名</label><input class="name" placeholder="姓名" />
        <label>金额</label><input class="money" type="number" placeholder="+/-" />
        ${mode === '追分' ? '<label>分值</label><input class="point" type="number" />' : ''}
    `;
    document.getElementById('players').appendChild(div);
}

function updateMode() {
    document.getElementById('scoreSection').style.display = document.getElementById('mode').value === '中八' ? 'block' : 'none';
}

// 初始化
loadData();
updateMode();
</script>
</body>
</html>
